<header class="sticky-top">
  <!-- Barra superior con información de contacto -->
  <div class="top-bar bg-dark text-white py-2">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
          <span class="me-3">
            <i class="bi bi-telephone-fill me-1"></i> (123) 456-7890
          </span>
          <span>
            <i class="bi bi-envelope-fill me-1"></i> contacto&#64;netGlases.com
          </span>
        </div>
        <div class="social-links">
          <a href="#" class="text-white mx-2"><i class="bi bi-facebook"></i></a>
          <a href="#" class="text-white mx-2"><i class="bi bi-instagram"></i></a>
          <a href="#" class="text-white mx-2"><i class="bi bi-whatsapp"></i></a>
        </div>
      </div>
    </div>
  </div>

  <!-- Barra de navegación principal -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary" routerLink="/">
        <i class="bi bi-eyeglasses me-2"></i>netGlases
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
              <i class="bi bi-house-door-fill me-1"></i> Inicio
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/catalogo" routerLinkActive="active">
              <i class="bi bi-grid-fill me-1"></i> Catálogo
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/servicios" routerLinkActive="active">
              <i class="bi bi-eyeglasses me-1"></i> Servicios
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/nosotros" routerLinkActive="active">
              <i class="bi bi-people-fill me-1"></i> Nosotros
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/contacto" routerLinkActive="active">
              <i class="bi bi-envelope-fill me-1"></i> Contacto
            </a>
          </li>
          @if (!isLogged) {
          <!-- Usuario NO autenticado -->
          <li class="nav-item">
            <a class="nav-link" routerLink="/auth/login" routerLinkActive="active">
              <i class="bi bi-person-lines-fill me-1"></i> Mi Cuenta
            </a>
          </li>
          }

          @if (isLogged && userQuery.data(); as user) {
          <!-- Usuario autenticado -->
          <li class="nav-item position-relative">
            <!-- BOTÓN avatar + hamburguesa -->
            <button class="btn nav-link d-flex align-items-center gap-2" (click)="toggleMenu()" type="button">
              <img [src]="user.photoUrl || 'assets/default-avatar.png'" class="rounded-circle" width="32" height="32"
                alt="Avatar" />
              <i class="bi bi-list fs-5"></i>
            </button>

            <!-- MENÚ -->
            @if (isMenuOpen) {
            <div class="dropdown-menu show dropdown-menu-end shadow">
              <a class="dropdown-item" routerLink="/dashboard/profile" (click)="closeMenu()">
                <i class="bi bi-person me-2"></i> Ver perfil
              </a>

              <button class="dropdown-item text-danger" (click)="logout()">
                <i class="bi bi-box-arrow-right me-2"></i> Cerrar sesión
              </button>
            </div>
            }
          </li>
          }

          <li class="nav-item ms-lg-3 mt-2 mt-lg-0">
            <a class="btn btn-primary" routerLink="/carrito">
              <i class="bi bi-cart-fill me-1"></i> Carrito
              <span class="badge bg-white text-primary ms-1">0</span>
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>
