<div class="auth-wrapper">
  <div class="auth-container">
    <div class="auth-card">
      
      <div class="auth-header">
        <div class="brand">
          <i class="bi bi-eye-fill"></i> <h1>ÓPTICA URBANA</h1>
        </div>
        <p class="subtitle">Gestión Profesional de Salud Visual</p>
      </div>

      <div class="auth-body">
        <router-outlet></router-outlet>
      </div>

      <div class="auth-footer">
        <div class="links-primary">
          @if (isLoginRoute()) {
            <a [routerLink]="['/auth/register']">¿No tienes cuenta? <span>Regístrate</span></a>
          } @else {
            <a routerLink="/auth/login">¿Ya tienes cuenta? <span>Inicia sesión</span></a>
          }
        </div>
        
        <div class="links-secondary">
          <a routerLink="/auth/forgot">Olvidé mi contraseña</a>
          <span class="divider">•</span>
          <a routerLink="/">Volver al Inicio</a>
        </div>
      </div>

    </div>
  </div>
</div>
